<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Midnight Brew Café</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Midnight Brew Café</h1>
<p>A cozy late-night café for students, coffee lovers, and night owls.</p>

<!-- IMAGE -->
<img id="cafe-img" src="./cafe-day.jpg" alt="Midnight Brew Café">

<br><br>

<!-- DAY/NIGHT BUTTON -->
<button id="toggle-mode">Toggle Day/Night Mode</button>

<!-- MENU -->
<h2>Menu</h2>
<ul id="menu-list"></ul>

<!-- DAILY SPECIAL -->
<button id="show-special">Show Daily Special</button>
<p id="daily-special"></p>

<!-- FAQ SECTION -->
<h2>FAQ</h2>

<div class="faq-item">
  <button class="faq-question">What are your hours?</button>
  <div class="faq-answer">We are open from 6pm to 2am every day.</div>
</div>

<div class="faq-item">
  <button class="faq-question">Do you have dairy-free options?</button>
  <div class="faq-answer">Yes! We offer almond, oat, and soy milk.</div>
</div>

<div class="faq-item">
  <button class="faq-question">Is WiFi available?</button>
  <div class="faq-answer">Yes, free high-speed WiFi is available.</div>
</div>

<div class="faq-item">
  <button class="faq-question">Can I study here late?</button>
  <div class="faq-answer">Absolutely! We are designed for late-night studying.</div>
</div>

<script src="script.js"></script>

</body>
</html>
